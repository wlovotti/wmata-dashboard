# WMATA-designated frequent-service Metrobus routes (NOTES-56).
#
# This is the authoritative *route-level* list of routes WMATA publishes
# as frequent service. It drives UI choices like "which metric is the
# headline KPI on RouteDetail?" — EWT is the rider-relevant headline
# for frequent service; OTP remains headline for standard service.
#
# Tier schema
# -----------
# WMATA's High-Frequency Metrobus Service Maps distinguish two tiers,
# and the EWT cell-hour gate (`src/ewt.py:FREQUENT_HEADWAY_MAX_SEC`,
# resolved per-route via `src/frequent_routes.py:get_cell_hour_gate_sec`)
# matches each tier's headline frequency:
#
#   - `high_freq`   — WMATA "High-Frequency Route"   (≤ 12 min headway)
#                     EWT cell-hour gate: 15 min   (legacy default)
#   - `medium_freq` — WMATA "Medium-Frequency Route" (≤ 20 min headway)
#                     EWT cell-hour gate: 20 min   (matches the tier)
#
# Both tiers are `is_frequent: true` for the headline-KPI flip (EWT
# becomes the headline whenever scheduled service is frequent enough
# that riders show up without a schedule; 20-min still qualifies).
# The split exists so the cell-hour gate matches the tier's actual
# scheduled headway — pooling 20-min cells into a 15-min gate
# excluded almost every medium-freq route from EWT entirely
# (`analysis/frequent_routes_audit_detail.py`).
#
# Source
# ------
# WMATA High-Frequency Metrobus Service Maps (June 29, 2025 — the
# Better Bus network redesign), pulled 2026-05-16:
#   - DC:       https://www.wmata.com/initiatives/plans/Better-Bus/upload/DC-High-Freq-Service-Map_06-16-2025_FINAL.pdf
#   - Maryland: https://www.wmata.com/initiatives/plans/Better-Bus/upload/MD-High-Freq-Service-Map_06-16-2025_FINAL.pdf
#   - Virginia: https://www.wmata.com/initiatives/plans/Better-Bus/upload/VA-High-Freq-Service-Map_06-16-2025_FINAL.pdf
# Index: https://www.wmata.com/schedules/maps/index.cfm
#
# Initial tier assignment was data-driven (2026-05-17) from the
# per-route share of weekday daytime cell-hours that clear each
# candidate gate — see `analysis/frequent_routes_audit_detail.py`.
# Routes that cleared the 15-min gate on ≥ 50% of their daytime
# cell-hours went into `high_freq`; routes that only cleared the
# 20-min gate (but not 15-min) went into `medium_freq`. Twelve
# original entries had no cell-hours clearing the 20-min gate
# either — these were dropped as corridor-frequency rather than
# route-frequency (the published map shows corridors; multiple
# overlapping branch/limited routes can make a corridor frequent
# without any one route being individually frequent).
#
# Refresh policy
# --------------
# WMATA's frequent-service map is published as part of network-redesign
# milestones (the June 2025 map is the first since the Better Bus
# rollout). Re-pull this list when WMATA publishes an updated map or
# when `analysis/frequent_routes_audit.py` /
# `analysis/frequent_routes_audit_detail.py` surface significant
# drift between published designation and data-driven gating.
#
# Schema
# ------
# high_freq:
#   - <route_id>   # exact GTFS route_id; one per line
# medium_freq:
#   - <route_id>
#
# Loader: `src/frequent_routes.py:load_frequent_route_ids()` returns
# the union of both tiers (backward-compat for callers asking "is
# this frequent at all?"). Per-tier loaders and the per-route gate
# helper are also in that module. Reload is lazy on file mtime —
# edits take effect without restart.

