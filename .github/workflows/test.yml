name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: wmata
          POSTGRES_PASSWORD: wmata
          POSTGRES_DB: wmata_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync --extra dev --extra postgres

    - name: Lint with ruff
      run: |
        uv run ruff check src/ scripts/ api/ pipelines/ tests/
        echo "✓ Ruff linting passed"

    - name: Check code formatting
      run: |
        uv run ruff format --check src/ scripts/ api/ pipelines/ tests/
        echo "✓ Code formatting check passed"

    - name: Test imports
      run: |
        uv run python -c "from src.database import get_session; print('✓ Imports work')"
        uv run python -c "from src.analytics import calculate_headways; print('✓ Analytics module loads')"
        uv run python -c "from src.trip_matching import find_matching_trip; print('✓ Trip matching module loads')"
        uv run python -c "from api.aggregations import get_all_routes_scorecard; print('✓ API module loads')"

    - name: Check code structure
      run: |
        test -d src && echo "✓ src/ directory exists"
        test -d scripts && echo "✓ scripts/ directory exists"
        test -d api && echo "✓ api/ directory exists"
        test -d pipelines && echo "✓ pipelines/ directory exists"
        test -d tests && echo "✓ tests/ directory exists"
        test -f src/__init__.py && echo "✓ src/__init__.py exists"

    - name: Verify schema (Postgres lane)
      env:
        DATABASE_URL: "postgresql://wmata:wmata@localhost:5432/wmata_test"
      run: |
        # Create tables from the SQLAlchemy models. We invoke init_db()
        # directly rather than scripts/init_database.py because the latter
        # also downloads ~40MB of GTFS data from the live WMATA API, which
        # we don't need (and shouldn't burn API budget on) for a schema
        # check.
        uv run python -c "from src.database import init_db; init_db()"
        echo "✓ Schema created"
        uv run python scripts/migrate_all.py
        echo "✓ Migrations applied"
        uv run python scripts/check_schema_drift.py
        echo "✓ Schema drift check passed"

    - name: Run smoke tests
      env:
        DATABASE_URL: "sqlite:///:memory:"
        WMATA_API_KEY: test_api_key
      run: |
        uv run pytest -m smoke -v --tb=short
        echo "✓ Smoke tests passed"

    - name: Run full test suite with coverage
      env:
        DATABASE_URL: "sqlite:///:memory:"
        WMATA_API_KEY: test_api_key
      run: |
        uv run pytest -v --tb=short --cov=src --cov=api --cov-report=term-missing
        echo "✓ All tests passed"

  frontend-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Lint
      working-directory: frontend
      run: npm run lint

    - name: Unit tests (Vitest)
      working-directory: frontend
      run: npm test

    - name: Install Playwright browsers
      working-directory: frontend
      run: npx playwright install --with-deps chromium

    - name: Visual regression tests (Playwright)
      working-directory: frontend
      run: npx playwright test
